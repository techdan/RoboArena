<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" class="effect projectile-grenade" data-anchor="10 10">
  <desc>Grenade in flight for `projectile-launched` (grenade-launcher). Round iron canister — rotation-free; the renderer lobs it on an arc (scale up then down mid-flight to fake height) and may spin it.</desc>
  <defs>
    <radialGradient id="pg-shell" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#8b95a1"/>
      <stop offset="55%" stop-color="#3a414b"/>
      <stop offset="100%" stop-color="#181d24"/>
    </radialGradient>
  </defs>
  <circle cx="10" cy="10" r="7.5" fill="url(#pg-shell)" stroke="#0e1116" stroke-width="1"/>
  <rect x="3.4" y="8.9" width="13.2" height="2.2" fill="#22272f"/>
  <rect x="8.9" y="3.4" width="2.2" height="13.2" fill="#22272f" opacity="0.7"/>
  <circle cx="10" cy="10" r="2" fill="#e0742f" stroke="#8a3d12" stroke-width="0.6"/>
  <circle cx="7.4" cy="6.8" r="1.6" fill="#cfd6dd" opacity="0.55"/>
</svg>
