  </g>
  <g fill="#6f6154">
    <circle cx="16" cy="18" r="3.5" opacity="0.7"/>
    <circle cx="23" cy="19" r="2.5" opacity="0.6"/>
    <circle cx="9" cy="19" r="2.2" opacity="0.6"/>
  </g>
  <circle cx="7" cy="9" r="1.1" fill="#9b8a72" opacity="0.8"/>
  <circle cx="25" cy="8" r="1" fill="#9b8a72" opacity="0.8"/>
