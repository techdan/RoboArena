<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 24" class="effect dust-miss" data-anchor="16 18">
  <desc>Dirt puff for `shot-missed` — the round lands in the ground near the target tile. Renderer plays a quick pop-and-settle at the miss position; earthy tones from the Rubble arena palette.</desc>
