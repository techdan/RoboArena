<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" class="robot rifle-c" data-class="rifle" data-posture="standing" data-turret-pivot="64 42" role="img" aria-labelledby="rc-title rc-desc">
  <title id="rc-title">Rifle bot — Direction C "Foundry Plate"</title>
  <desc id="rc-desc">Hard-surface quadruped mech: faceted steel carapace with a team-red painted dorsal plate, hydraulic two-segment legs with claw feet, octagonal sensor pod with a glowing visor, and a long marksman rifle. Turret layer is drawn top-down pointing N and rotates around the pivot at (64,42). Layer groups: shadow, team-ring, legs, body, turret.</desc>
