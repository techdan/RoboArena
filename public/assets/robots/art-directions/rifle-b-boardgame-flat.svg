<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" class="robot rifle-b" data-class="rifle" data-posture="standing" data-turret-pivot="64 42" role="img" aria-labelledby="rb-title rb-desc">
  <title id="rb-title">Rifle bot — Direction B "Boardgame Flat"</title>
