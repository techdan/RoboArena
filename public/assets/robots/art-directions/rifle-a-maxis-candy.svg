<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" class="robot rifle-a" data-class="rifle" data-posture="standing" data-turret-pivot="64 42" role="img" aria-labelledby="ra-title ra-desc">
  <title id="ra-title">Rifle bot — Direction A "Maxis Candy"</title>
  <desc id="ra-desc">Glossy candy-red quadruped with gold ball joints, a domed crested head, and a side-mounted blue rifle. Turret layer is drawn top-down pointing N and rotates around the pivot at (64,42). Layer groups: shadow, team-ring, legs, body, turret.</desc>
  <defs>
    <radialGradient id="ra-shell" cx="38%" cy="26%" r="80%">
      <stop offset="0%" stop-color="#ffe1d4"/>
      <stop offset="20%" stop-color="#ff7a5f"/>
      <stop offset="55%" stop-color="#e02330"/>
      <stop offset="82%" stop-color="#8c0f1a"/>
      <stop offset="100%" stop-color="#45070f"/>
    </radialGradient>
    <radialGradient id="ra-dome" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#ffd7c8"/>
      <stop offset="45%" stop-color="#f0503f"/>
      <stop offset="82%" stop-color="#a01320"/>
      <stop offset="100%" stop-color="#4a0810"/>
    </radialGradient>
    <radialGradient id="ra-gold" cx="38%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#fff3c9"/>
      <stop offset="45%" stop-color="#ffc03e"/>
      <stop offset="100%" stop-color="#9c5a06"/>
    </radialGradient>
    <radialGradient id="ra-gold-flat" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="55%" stop-color="#f0a92c"/>
      <stop offset="100%" stop-color="#8a4c05"/>
    </radialGradient>
    <linearGradient id="ra-leg" x1="18" y1="56" x2="110" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff8f78"/>
      <stop offset="45%" stop-color="#c11a26"/>
      <stop offset="100%" stop-color="#5d0910"/>
    </linearGradient>
    <linearGradient id="ra-gun" x1="72" y1="0" x2="82" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e4a8c"/>
      <stop offset="42%" stop-color="#a8e0fb"/>
      <stop offset="58%" stop-color="#d9f4ff"/>
      <stop offset="100%" stop-color="#0b3a74"/>
    </linearGradient>
    <linearGradient id="ra-neck" x1="58" y1="46" x2="70" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff9a85"/>
      <stop offset="55%" stop-color="#b8151f"/>
      <stop offset="100%" stop-color="#4f070f"/>
    </linearGradient>
  </defs>

  <ellipse class="team-ring" cx="64" cy="101" rx="49" ry="13" fill="none" stroke="var(--team, #2ec9ff)" stroke-width="2.5" opacity="0.85"/>
  <ellipse class="shadow" cx="64" cy="101" rx="45" ry="11.5" fill="#07101a" opacity="0.25"/>

  <g class="legs">
    <g class="leg rear-left">
      <path d="M47 64 29 65" fill="none" stroke="#45070f" stroke-width="9" stroke-linecap="round"/>
      <path d="M47 64 29 65" fill="none" stroke="url(#ra-leg)" stroke-width="6.6" stroke-linecap="round"/>
      <path d="M29 65 20.5 85" fill="none" stroke="#45070f" stroke-width="7.4" stroke-linecap="round"/>
      <path d="M29 65 20.5 85" fill="none" stroke="url(#ra-leg)" stroke-width="5.2" stroke-linecap="round"/>
      <circle cx="29" cy="65" r="4.4" fill="url(#ra-gold)"/>
      <ellipse cx="27.7" cy="63.6" rx="1.5" ry="1" fill="#fff6dd" opacity="0.85"/>
      <ellipse cx="19.5" cy="87.5" rx="6" ry="4.4" fill="url(#ra-gold)"/>
      <ellipse cx="17.6" cy="86" rx="2.2" ry="1.2" fill="#fff6dd" opacity="0.8"/>
    </g>
    <g class="leg rear-right">
      <path d="M81 64 99 65" fill="none" stroke="#45070f" stroke-width="9" stroke-linecap="round"/>
      <path d="M81 64 99 65" fill="none" stroke="url(#ra-leg)" stroke-width="6.6" stroke-linecap="round"/>
      <path d="M99 65 107.5 85" fill="none" stroke="#45070f" stroke-width="7.4" stroke-linecap="round"/>
      <path d="M99 65 107.5 85" fill="none" stroke="url(#ra-leg)" stroke-width="5.2" stroke-linecap="round"/>
      <circle cx="99" cy="65" r="4.4" fill="url(#ra-gold)"/>
      <ellipse cx="97.7" cy="63.6" rx="1.5" ry="1" fill="#fff6dd" opacity="0.85"/>
      <ellipse cx="108.5" cy="87.5" rx="6" ry="4.4" fill="url(#ra-gold)"/>
      <ellipse cx="106.6" cy="86" rx="2.2" ry="1.2" fill="#fff6dd" opacity="0.8"/>
    </g>
    <g class="leg front-left">
      <path d="M50 84 36 96" fill="none" stroke="#45070f" stroke-width="9.6" stroke-linecap="round"/>
      <path d="M50 84 36 96" fill="none" stroke="url(#ra-leg)" stroke-width="7" stroke-linecap="round"/>
      <path d="M36 96 29 108" fill="none" stroke="#45070f" stroke-width="7.8" stroke-linecap="round"/>
      <path d="M36 96 29 108" fill="none" stroke="url(#ra-leg)" stroke-width="5.6" stroke-linecap="round"/>
      <circle cx="36" cy="96" r="4.7" fill="url(#ra-gold)"/>
      <ellipse cx="34.6" cy="94.5" rx="1.6" ry="1.1" fill="#fff6dd" opacity="0.85"/>
      <ellipse cx="28" cy="109.5" rx="6.6" ry="4.8" fill="url(#ra-gold)"/>
      <ellipse cx="25.9" cy="107.9" rx="2.4" ry="1.3" fill="#fff6dd" opacity="0.8"/>
    </g>
    <g class="leg front-right">
      <path d="M78 84 92 96" fill="none" stroke="#45070f" stroke-width="9.6" stroke-linecap="round"/>
      <path d="M78 84 92 96" fill="none" stroke="url(#ra-leg)" stroke-width="7" stroke-linecap="round"/>
      <path d="M92 96 99 108" fill="none" stroke="#45070f" stroke-width="7.8" stroke-linecap="round"/>
      <path d="M92 96 99 108" fill="none" stroke="url(#ra-leg)" stroke-width="5.6" stroke-linecap="round"/>
      <circle cx="92" cy="96" r="4.7" fill="url(#ra-gold)"/>
      <ellipse cx="90.6" cy="94.5" rx="1.6" ry="1.1" fill="#fff6dd" opacity="0.85"/>
      <ellipse cx="100" cy="109.5" rx="6.6" ry="4.8" fill="url(#ra-gold)"/>
      <ellipse cx="97.9" cy="107.9" rx="2.4" ry="1.3" fill="#fff6dd" opacity="0.8"/>
    </g>
  </g>

  <g class="body">
    <ellipse cx="64" cy="73.5" rx="27" ry="23" fill="#4a070f"/>
    <ellipse cx="64" cy="71" rx="27" ry="23" fill="url(#ra-shell)"/>
    <ellipse cx="64" cy="88" rx="16" ry="7" fill="#3f060d" opacity="0.5"/>
    <path d="M40 79 Q 64 92 88 79" fill="none" stroke="url(#ra-gold-flat)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="46" cy="81.6" r="1.4" fill="#ffe9a8"/>
    <circle cx="64" cy="85.8" r="1.4" fill="#ffe9a8"/>
    <circle cx="82" cy="81.6" r="1.4" fill="#ffe9a8"/>
    <ellipse cx="53" cy="57.5" rx="9.5" ry="5" transform="rotate(-24 53 57.5)" fill="#ffffff" opacity="0.5"/>
    <circle cx="49.5" cy="54.5" r="2" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="49.5" cy="85.5" rx="4.6" ry="3.6" fill="#620913"/>
    <ellipse cx="78.5" cy="85.5" rx="4.6" ry="3.6" fill="#620913"/>
    <rect x="59.5" y="45" width="9" height="13" rx="3.5" fill="url(#ra-neck)"/>
    <path d="M60 51.5 h8" stroke="#5c0810" stroke-width="1.4" opacity="0.6"/>
  </g>

  <g class="turret">
    <circle cx="64" cy="42" r="11.4" fill="url(#ra-gold-flat)"/>
    <circle cx="64" cy="42" r="9.2" fill="url(#ra-dome)"/>
    <rect x="62.5" y="37.5" width="3" height="13.6" rx="1.5" fill="url(#ra-gold-flat)"/>
    <circle cx="57.5" cy="48.5" r="1.8" fill="url(#ra-gold-flat)"/>
    <circle cx="70.5" cy="48.5" r="1.8" fill="url(#ra-gold-flat)"/>
    <circle cx="64" cy="34.6" r="2.5" fill="#2b0508"/>
    <circle cx="64" cy="34.4" r="1.5" fill="#fff7ea"/>
    <circle cx="64.5" cy="33.9" r="0.6" fill="#ffffff"/>
    <rect x="70" y="38.5" width="7" height="7" rx="2.5" fill="#7c0d16"/>
    <rect x="74.6" y="49" width="4.8" height="8" rx="2" fill="#0b3a74"/>
    <rect x="73.3" y="29" width="7.4" height="21" rx="3" fill="url(#ra-gun)"/>
    <circle cx="81.2" cy="33" r="1.6" fill="url(#ra-gold)"/>
    <rect x="75.5" y="11" width="3" height="20" rx="1.5" fill="url(#ra-gun)"/>
    <rect x="74.4" y="24" width="5.2" height="2.6" rx="1.3" fill="#0b3a74"/>
    <circle cx="77" cy="10.6" r="2.7" fill="#071d3f"/>
    <circle cx="77" cy="10.6" r="1.1" fill="#9fd7f5"/>
