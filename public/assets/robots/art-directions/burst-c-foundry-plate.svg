<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" class="robot burst-c" data-class="burst" data-posture="standing" data-turret-pivot="64 42" role="img" aria-labelledby="bc-title bc-desc">
  <title id="bc-title">Burst bot — Foundry Plate</title>
  <desc id="bc-desc">Foundry Plate chassis with a burst-class turret: a short, wide tri-barrel cannon (three stubby muzzles, center barrel longest). Shares the standard rig: shadow, team-ring, legs, body, turret; turret drawn top-down pointing N, pivot (64,42). Team color via .team-paint hooks.</desc>
  <defs>
    <linearGradient id="rc-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dfe5ea"/>
      <stop offset="40%" stop-color="#a9b2bc"/>
      <stop offset="75%" stop-color="#6a7480"/>
      <stop offset="100%" stop-color="#454d58"/>
    </linearGradient>
    <linearGradient id="rc-iron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b95a1"/>
      <stop offset="55%" stop-color="#3a414b"/>
      <stop offset="100%" stop-color="#22272f"/>
    </linearGradient>
    <linearGradient id="rc-paint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8453a"/>
      <stop offset="55%" stop-color="#a3241f"/>
      <stop offset="100%" stop-color="#5f1213"/>
    </linearGradient>
    <linearGradient id="rc-gun" x1="72" y1="0" x2="82" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#39404a"/>
      <stop offset="45%" stop-color="#9aa5b1"/>
      <stop offset="58%" stop-color="#c7d0d8"/>
      <stop offset="100%" stop-color="#2c323b"/>
    </linearGradient>
    <radialGradient id="rc-pod" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#cfd6dd"/>
      <stop offset="60%" stop-color="#7e8894"/>
      <stop offset="100%" stop-color="#3a414b"/>
    </radialGradient>
  </defs>

  <ellipse class="team-ring" cx="64" cy="101" rx="49" ry="13" fill="none" stroke="var(--team, #2ec9ff)" stroke-width="5" opacity="0.22"/>
  <ellipse class="team-ring-core" cx="64" cy="101" rx="49" ry="13" fill="none" stroke="var(--team, #2ec9ff)" stroke-width="1.8" opacity="0.9"/>
  <ellipse class="shadow" cx="64" cy="101" rx="45" ry="11.5" fill="#0a0d12" opacity="0.25"/>

  <g class="legs" stroke-linejoin="round">
    <g class="leg rear-left">
      <polygon points="47,59.5 47,66.5 29,67.6 29,62.4" fill="url(#rc-steel)" stroke="#22272f" stroke-width="1"/>
      <path d="M44 61.5 32 63" stroke="#eef2f5" stroke-width="1" opacity="0.6"/>
      <polygon points="31,63.5 26.5,65.5 19,84 23,86 " fill="url(#rc-iron)" stroke="#181d24" stroke-width="1"/>
      <path d="M27.5 68 22 82" stroke="#b9c2cb" stroke-width="1.4" opacity="0.9"/>
      <circle cx="29" cy="65" r="4" fill="url(#rc-steel)" stroke="#22272f" stroke-width="1"/>
      <circle cx="29" cy="65" r="1.4" fill="#22272f"/>
      <polygon points="24,84 13.5,86.5 16,90.5 26,89.5" fill="url(#rc-iron)" stroke="#14181e" stroke-width="1"/>
      <path d="M19.5 86 20.5 89.8" stroke="#0f1318" stroke-width="1.1"/>
    </g>
    <g class="leg rear-right">
      <polygon points="81,59.5 81,66.5 99,67.6 99,62.4" fill="url(#rc-steel)" stroke="#22272f" stroke-width="1"/>
      <path d="M84 61.5 96 63" stroke="#eef2f5" stroke-width="1" opacity="0.6"/>
      <polygon points="97,63.5 101.5,65.5 109,84 105,86" fill="url(#rc-iron)" stroke="#181d24" stroke-width="1"/>
      <path d="M100.5 68 106 82" stroke="#b9c2cb" stroke-width="1.4" opacity="0.9"/>
      <circle cx="99" cy="65" r="4" fill="url(#rc-steel)" stroke="#22272f" stroke-width="1"/>
      <circle cx="99" cy="65" r="1.4" fill="#22272f"/>
      <polygon points="104,84 114.5,86.5 112,90.5 102,89.5" fill="url(#rc-iron)" stroke="#14181e" stroke-width="1"/>
      <path d="M108.5 86 107.5 89.8" stroke="#0f1318" stroke-width="1.1"/>
    </g>
    <g class="leg front-left">
      <polygon points="51,80.5 48,87.5 33,98 31.5,93" fill="url(#rc-steel)" stroke="#22272f" stroke-width="1"/>
      <path d="M48 84 36 93.5" stroke="#eef2f5" stroke-width="1" opacity="0.6"/>
      <polygon points="38,94 32.5,95.5 26.5,107.5 31,109" fill="url(#rc-iron)" stroke="#181d24" stroke-width="1"/>
      <path d="M33.5 98.5 29.5 106.5" stroke="#b9c2cb" stroke-width="1.4" opacity="0.9"/>
      <circle cx="36" cy="96" r="4.3" fill="url(#rc-steel)" stroke="#22272f" stroke-width="1"/>
      <circle cx="36" cy="96" r="1.5" fill="#22272f"/>
      <polygon points="32,106.5 20.5,110 24,114.5 34.5,112" fill="url(#rc-iron)" stroke="#14181e" stroke-width="1"/>
      <path d="M27 109.5 28.5 113.5" stroke="#0f1318" stroke-width="1.1"/>
    </g>
    <g class="leg front-right">
      <polygon points="77,80.5 80,87.5 95,98 96.5,93" fill="url(#rc-steel)" stroke="#22272f" stroke-width="1"/>
      <path d="M80 84 92 93.5" stroke="#eef2f5" stroke-width="1" opacity="0.6"/>
      <polygon points="90,94 95.5,95.5 101.5,107.5 97,109" fill="url(#rc-iron)" stroke="#181d24" stroke-width="1"/>
      <path d="M94.5 98.5 98.5 106.5" stroke="#b9c2cb" stroke-width="1.4" opacity="0.9"/>
      <circle cx="92" cy="96" r="4.3" fill="url(#rc-steel)" stroke="#22272f" stroke-width="1"/>
      <circle cx="92" cy="96" r="1.5" fill="#22272f"/>
      <polygon points="96,106.5 107.5,110 104,114.5 93.5,112" fill="url(#rc-iron)" stroke="#14181e" stroke-width="1"/>
      <path d="M101 109.5 99.5 113.5" stroke="#0f1318" stroke-width="1.1"/>
    </g>
  </g>

  <!-- compact hull: whole body scaled 0.87 around the ground anchor (64,93); legs and turret pivot unchanged -->
  <g class="body" transform="translate(64 93) scale(0.87) translate(-64 -93)">
    <ellipse cx="64" cy="92" rx="17" ry="6" fill="#14181e"/>
    <path d="M38 73 Q39 58 46 54 Q54 48.5 64 48.5 Q74 48.5 82 54 Q89 58 90 73 Q89 83 80 89.5 Q72 94.5 64 94.5 Q56 94.5 48 89.5 Q39 83 38 73 Z"
          fill="url(#rc-steel)" stroke="#1c2127" stroke-width="1.4"/>
    <path class="team-paint" d="M64 55 L82 63 L82 77 L64 88 L46 77 L46 63 Z" fill="url(#rc-paint)" stroke="#4a0f10" stroke-width="1"/>
    <path class="team-paint-edge" d="M50 62.5 L64 55.5 L78 62.5" fill="none" stroke="#ff9d8c" stroke-width="1" opacity="0.55"/>
    <path d="M46 63 L40 59.5 M82 63 L88 59.5 M82 77 L88 80 M46 77 L40 80" stroke="#262c34" stroke-width="1" opacity="0.85"/>
    <circle cx="64" cy="57.5" r="1.1" fill="#e3e9ee" stroke="#333a42" stroke-width="0.5"/>
    <circle cx="80" cy="63.5" r="1.1" fill="#e3e9ee" stroke="#333a42" stroke-width="0.5"/>
    <circle cx="48" cy="63.5" r="1.1" fill="#e3e9ee" stroke="#333a42" stroke-width="0.5"/>
    <circle cx="80" cy="76.5" r="1.1" fill="#e3e9ee" stroke="#333a42" stroke-width="0.5"/>
    <circle cx="48" cy="76.5" r="1.1" fill="#e3e9ee" stroke="#333a42" stroke-width="0.5"/>
    <circle cx="64" cy="85.5" r="1.1" fill="#e3e9ee" stroke="#333a42" stroke-width="0.5"/>
    <rect x="41" y="63.5" width="5" height="1.7" rx="0.8" transform="rotate(18 43.5 64.3)" fill="#14181e"/>
    <rect x="42" y="67.5" width="5" height="1.7" rx="0.8" transform="rotate(18 44.5 68.3)" fill="#14181e"/>
    <rect x="60" y="43" width="8" height="12" rx="2" fill="url(#rc-iron)" stroke="#14181e" stroke-width="1"/>
    <path d="M60.5 47 h7 M60.5 50 h7" stroke="#0f1318" stroke-width="1" opacity="0.8"/>
  </g>

  <g class="turret">
    <circle cx="64" cy="42" r="11" fill="url(#rc-iron)" stroke="#14181e" stroke-width="1.2"/>
    <circle cx="56.5" cy="34.5" r="1" fill="#cfd6dd"/>
    <circle cx="71.5" cy="34.5" r="1" fill="#cfd6dd"/>
    <circle cx="56.5" cy="49.5" r="1" fill="#cfd6dd"/>
    <circle cx="71.5" cy="49.5" r="1" fill="#cfd6dd"/>
    <polygon points="71.85,45.25 67.25,49.85 60.75,49.85 56.15,45.25 56.15,38.75 60.75,34.15 67.25,34.15 71.85,38.75"
             fill="url(#rc-pod)" stroke="#1c2127" stroke-width="1.2"/>
    <polygon points="69.2,44.15 66.15,47.2 61.85,47.2 58.8,44.15 58.8,39.85 61.85,36.8 66.15,36.8 69.2,39.85" fill="url(#rc-iron)"/>
    <rect x="59.5" y="32.2" width="9" height="4.6" rx="2.3" fill="#3ad9ee" opacity="0.3"/>
    <rect x="60.5" y="33.4" width="7" height="2.6" rx="1.2" fill="#6ff2ff"/>
    <path d="M69.5 47.5 73 51" stroke="#8b95a1" stroke-width="1.2"/>
    <circle cx="73.4" cy="51.4" r="1" fill="#6ff2ff"/>
    <rect x="70" y="39" width="7" height="6.4" rx="1.2" fill="url(#rc-iron)" stroke="#14181e" stroke-width="1"/>
    <rect x="74.9" y="47.5" width="4.2" height="7" rx="1.4" fill="#22272f"/>
    <rect x="72.4" y="31" width="10.2" height="17" rx="2" fill="url(#rc-gun)" stroke="#14181e" stroke-width="1"/>
    <rect class="team-paint-accent" x="73.2" y="42.5" width="8.6" height="2.4" fill="#c8362e"/>
    <circle cx="81.6" cy="35" r="1.6" fill="#cfd6dd" stroke="#14181e" stroke-width="0.6"/>
    <rect x="73.2" y="20" width="2.2" height="12.5" fill="url(#rc-gun)" stroke="#14181e" stroke-width="0.7"/>
    <rect x="76.3" y="18" width="2.2" height="14.5" fill="url(#rc-gun)" stroke="#14181e" stroke-width="0.7"/>
    <rect x="79.4" y="20" width="2.2" height="12.5" fill="url(#rc-gun)" stroke="#14181e" stroke-width="0.7"/>
    <rect x="72.6" y="26.5" width="9.8" height="2" fill="#22272f"/>
    <circle cx="74.3" cy="19.6" r="1.2" fill="#14181e"/>
    <circle cx="77.4" cy="17.6" r="1.2" fill="#14181e"/>
    <circle cx="80.5" cy="19.6" r="1.2" fill="#14181e"/>
  </g>
</svg>
