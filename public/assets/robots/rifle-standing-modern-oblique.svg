        <path class="front-upper" d="M76.2 75 92.4 92" fill="none" stroke="url(#redLimb)" stroke-width="7.3" stroke-linecap="round"/>
        <path class="front-upper-glint" d="M73.9 74.8 89.4 90" fill="none" stroke="#ffd4cc" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
        <circle class="front-knee-shadow" cx="92.5" cy="92.2" r="6.5" fill="#3b050b"/>
        <circle class="front-knee" cx="92.5" cy="92.2" r="4.9" fill="url(#kneeCap)"/>
        <path class="front-lower-shadow" d="M92.6 92.9 102.1 111.6" fill="none" stroke="#220309" stroke-width="8.5" stroke-linecap="round"/>
        <path class="front-lower" d="M92.4 92.8 101.1 111.4" fill="none" stroke="url(#limbEdge)" stroke-width="6" stroke-linecap="round"/>
        <path class="front-lower-glint" d="M90.5 94.2 98.6 110" fill="none" stroke="#ffd9d2" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
        <ellipse class="front-foot" cx="103.2" cy="115.6" rx="11.9" ry="4.9" transform="rotate(12 103.2 115.6)" fill="url(#footPad)"/>
        <ellipse class="front-foot-glint" cx="99.2" cy="113.5" rx="5.9" ry="1.25" transform="rotate(12 99.2 113.5)" fill="#c5d0d9" opacity="0.5"/>
      </g>

