        <path class="rear-upper-glint" d="M47.5 74.4 37.1 90" fill="none" stroke="#ffd4cc" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
        <circle class="rear-knee-shadow" cx="38.4" cy="92.7" r="6.1" fill="#3b050b"/>
        <circle class="rear-knee" cx="38.4" cy="92.7" r="4.6" fill="url(#kneeCap)"/>
        <path class="rear-lower-shadow" d="M38.4 93.4 29.8 111.2" fill="none" stroke="#220309" stroke-width="8.1" stroke-linecap="round"/>
        <path class="rear-lower" d="M38.6 93.1 30.6 111" fill="none" stroke="url(#limbEdge)" stroke-width="5.7" stroke-linecap="round"/>
        <path class="rear-lower-glint" d="M36.4 94.5 29.5 109.6" fill="none" stroke="#ffd9d2" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
