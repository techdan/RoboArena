<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" class="robot rifle-standing-concept-strider" data-facing="E" data-posture="standing" role="img" aria-labelledby="title desc">
  <title id="title">Arena strider rifle robot concept</title>
  <desc id="desc">A modern tall biped arena robot with long digitigrade legs, compact red body, floating circular head, and blue stabilized rifle pod.</desc>
  <defs>
    <radialGradient id="striderBody" cx="35%" cy="24%" r="76%">
      <stop offset="0%" stop-color="#fff0e8"/>
      <stop offset="22%" stop-color="#ff6a59"/>
      <stop offset="58%" stop-color="#c91420"/>
      <stop offset="100%" stop-color="#36050a"/>
    </radialGradient>
    <radialGradient id="striderHead" cx="36%" cy="24%" r="74%">
      <stop offset="0%" stop-color="#ffe4dc"/>
      <stop offset="33%" stop-color="#f24a40"/>
      <stop offset="100%" stop-color="#45060d"/>
    </radialGradient>
    <linearGradient id="striderLimb" x1="24" y1="70" x2="105" y2="121" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb4aa"/>
      <stop offset="30%" stop-color="#df2331"/>
      <stop offset="72%" stop-color="#710a13"/>
      <stop offset="100%" stop-color="#220309"/>
    </linearGradient>
    <linearGradient id="striderBlue" x1="72" y1="28" x2="122" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ecfdff"/>
      <stop offset="28%" stop-color="#5fd4ff"/>
      <stop offset="64%" stop-color="#0875d8"/>
      <stop offset="100%" stop-color="#061742"/>
    </linearGradient>
    <linearGradient id="striderFoot" x1="21" y1="108" x2="111" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a8b5bf"/>
      <stop offset="42%" stop-color="#303b48"/>
      <stop offset="100%" stop-color="#060a10"/>
    </linearGradient>
    <filter id="striderShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="3.5" flood-color="#07101a" flood-opacity="0.36"/>
    </filter>
  </defs>

  <ellipse cx="65" cy="117.5" rx="42" ry="7.5" fill="#07101a" opacity="0.28"/>
  <g filter="url(#striderShadow)">
    <g class="long-legs">
      <path d="M55 70 39 88 30 112" fill="none" stroke="#240309" stroke-width="8.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M55 70 39 88 30 112" fill="none" stroke="url(#striderLimb)" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="39" cy="88" r="4.5" fill="#bf1420"/>
      <ellipse cx="28" cy="115" rx="10.8" ry="4.4" transform="rotate(-13 28 115)" fill="url(#striderFoot)"/>
      <path d="M73 70 90 88 104 112" fill="none" stroke="#240309" stroke-width="8.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M73 70 90 88 104 112" fill="none" stroke="url(#striderLimb)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="90" cy="88" r="4.8" fill="#bf1420"/>
      <ellipse cx="106" cy="115" rx="11.6" ry="4.7" transform="rotate(14 106 115)" fill="url(#striderFoot)"/>
    </g>

    <g class="compact-body">
      <path d="M43 57c4.8-13 17.6-19.6 31.3-16.5 13.8 3.1 23 14.5 22.2 28.1-.9 14.8-13.1 25.1-28.8 24.8-18.1-.3-31.5-18.7-24.7-36.4Z" fill="#3c050b"/>
      <path d="M43.5 54.6c5-13.3 18.2-20 31.9-16.6 14 3.4 23 15.2 21.4 28.8-1.8 14.5-14.5 24-29.9 23.2-17.6-.9-30.2-18.8-23.4-35.4Z" fill="url(#striderBody)"/>
      <path d="M49.8 49.3c10.2 10.1 27 12.8 44.3 5.2l.6 6.5c-15.3 7.9-36.2 7.2-48.4-4.8Z" fill="#ffd9d1" opacity="0.26"/>
      <ellipse cx="55.5" cy="49" rx="8.8" ry="4.3" transform="rotate(-28 55.5 49)" fill="#fff3ed" opacity="0.58"/>
      <path d="M47.8 66.5c12.4 8.4 30.7 8.9 45 1.3" fill="none" stroke="#680810" stroke-width="1.75" stroke-linecap="round" opacity="0.5"/>
    </g>

    <g class="neck-head">
      <path d="M59 42c-.9-8.2 1.6-14.6 7.1-18.6 5.3.8 8.9 3.4 10.9 7.6-5.5 3.8-7.8 10.1-6.8 18.7-4.3 1.4-8-.9-11.2-7.7Z" fill="#3c050b"/>
      <path d="M57.8 40.9c-.8-8.8 1.9-15.7 7.8-19.9 5.6.9 9.4 3.7 11.5 8.2-6 4-8.5 10.6-7.5 19.9-4.4 1.7-8.3-1-11.8-8.2Z" fill="url(#striderBody)"/>
      <circle cx="66" cy="23" r="13.5" fill="#3c050b"/>
      <circle cx="64.7" cy="22.2" r="13.5" fill="url(#striderHead)"/>
      <ellipse cx="59" cy="16.5" rx="5.8" ry="3" transform="rotate(-30 59 16.5)" fill="#fff0e8" opacity="0.58"/>
      <circle cx="72.3" cy="23.7" r="3.2" fill="#4f0710"/>
      <circle cx="73" cy="23.1" r="1.7" fill="#fff6ea"/>
    </g>

    <g class="pod-rifle">
      <path d="M75 27c4.7-4.9 12.8-4.8 17.4.1 3.2 3.5 4.4 8.4 3.1 13l-7.2 3.5c-4.8-.9-8.6-4.2-10.2-8.8-.8-2.7-1.7-5.4-3.1-7.8Z" fill="url(#striderBlue)"/>
      <path d="M80 26.9c4-2.6 8.8-2.3 11.9.5-2.9 3.2-8 4.1-12.8 2.5 0-1.1.3-2.1.9-3Z" fill="#dffbff" opacity="0.5"/>
      <path d="M88 27.5 111 33.4c3.1.8 5 4.1 4 7.1l-.5 1.4-28.2-7.5 1.7-6.9Z" fill="url(#striderBlue)"/>
      <path d="M90 29.1 112.1 34.6c1.2.3 2.1 1.3 2.4 2.4l-24.7-6.2c0-.7.1-1.2.2-1.7Z" fill="#effdff" opacity="0.58"/>
      <ellipse cx="111.5" cy="38.8" rx="4.4" ry="4" transform="rotate(15 111.5 38.8)" fill="#061640"/>
      <ellipse cx="111.1" cy="38.7" rx="2.2" ry="1.9" transform="rotate(15 111.1 38.7)" fill="#37a8ff"/>
    </g>
  </g>
</svg>
