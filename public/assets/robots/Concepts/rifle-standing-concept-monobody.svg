<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" class="robot rifle-standing-concept-monobody" data-facing="E" data-posture="standing" role="img" aria-labelledby="title desc">
  <title id="title">Monobody arena biped concept</title>
  <desc id="desc">A creative red biped where head and body are one large armored bulb with legs and a blue side-mounted rifle.</desc>
  <defs>
    <radialGradient id="monoShell" cx="35%" cy="20%" r="76%">
      <stop offset="0%" stop-color="#fff1e8"/>
      <stop offset="18%" stop-color="#ff7563"/>
      <stop offset="55%" stop-color="#d71924"/>
      <stop offset="100%" stop-color="#3a050b"/>
    </radialGradient>
    <linearGradient id="monoBlue" x1="77" y1="39" x2="123" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ebfcff"/>
      <stop offset="27%" stop-color="#5bd0ff"/>
      <stop offset="64%" stop-color="#0874d8"/>
      <stop offset="100%" stop-color="#061742"/>
    </linearGradient>
    <linearGradient id="monoLeg" x1="25" y1="77" x2="105" y2="119" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffc6bc"/>
      <stop offset="32%" stop-color="#de2030"/>
      <stop offset="70%" stop-color="#780a14"/>
      <stop offset="100%" stop-color="#220309"/>
    </linearGradient>
    <linearGradient id="monoFoot" x1="22" y1="108" x2="112" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a7b4bd"/>
      <stop offset="42%" stop-color="#303b48"/>
      <stop offset="100%" stop-color="#060a10"/>
    </linearGradient>
    <filter id="monoShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="3.6" flood-color="#07101a" flood-opacity="0.37"/>
    </filter>
  </defs>

  <ellipse cx="64" cy="118" rx="41" ry="7.5" fill="#07101a" opacity="0.28"/>
  <g filter="url(#monoShadow)">
    <g class="legs">
      <path d="M52 81 36 96 27 112" fill="none" stroke="#240309" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M52 81 36 96 27 112" fill="none" stroke="url(#monoLeg)" stroke-width="5.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="36" cy="96" r="4.8" fill="#bf1420"/>
      <ellipse cx="25" cy="115" rx="11" ry="4.4" transform="rotate(-15 25 115)" fill="url(#monoFoot)"/>
      <path d="M76 81 94 96 106 112" fill="none" stroke="#240309" stroke-width="9.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M76 81 94 96 106 112" fill="none" stroke="url(#monoLeg)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="94" cy="96" r="5.1" fill="#bf1420"/>
      <ellipse cx="108" cy="115" rx="12" ry="4.7" transform="rotate(13 108 115)" fill="url(#monoFoot)"/>
    </g>

    <g class="monobody">
      <path d="M39 37c7-24 35-31 53-12 15.8 16.8 12.6 48.7-5.3 64-15.8 13.6-42.6 8.7-52.2-9.9C27.2 64.9 32 49.3 39 37Z" fill="#3c050b"/>
      <path d="M40.3 33.4c7.5-24.2 36.4-30.1 53.3-10.7 15.3 17.6 10.8 48.8-7.5 63.1-16.5 12.9-42.3 7.1-51-11.7-6.2-13.4-1.7-28.2 5.2-40.7Z" fill="url(#monoShell)"/>
      <path d="M45.8 28.7c12.9 12.8 31.9 16.5 49.1 7.6l1 7.7c-15.4 9.5-39.7 8.4-54.5-6.8Z" fill="#ffd8cf" opacity="0.28"/>
      <ellipse cx="54" cy="27" rx="9.4" ry="4.2" transform="rotate(-31 54 27)" fill="#fff4ec" opacity="0.64"/>
      <path d="M42.6 66.5c12.7 9.4 32.2 11.3 49.8 3.1" fill="none" stroke="#670810" stroke-width="1.8" stroke-linecap="round" opacity="0.52"/>
      <circle cx="68" cy="43" r="8" fill="#49070d"/>
      <circle cx="68.8" cy="42.4" r="5" fill="#fff4e8"/>
      <circle cx="70.5" cy="41.1" r="1.4" fill="#fff"/>
      <circle cx="85.8" cy="58.5" r="4.2" fill="#4a0710"/>
      <circle cx="85.5" cy="58" r="2.5" fill="#ff6b5d"/>
    </g>

    <g class="side-rifle">
      <ellipse cx="92" cy="49" rx="8.4" ry="7" transform="rotate(10 92 49)" fill="#061742"/>
      <ellipse cx="90" cy="47.8" rx="7.7" ry="6" transform="rotate(10 90 47.8)" fill="url(#monoBlue)"/>
      <rect x="97" y="44.4" width="27" height="7.2" rx="3.6" transform="rotate(8 97 44.4)" fill="url(#monoBlue)"/>
      <rect x="99.2" y="45.4" width="20" height="1.5" rx="0.75" transform="rotate(8 99.2 45.4)" fill="#f2feff" opacity="0.58"/>
      <ellipse cx="124" cy="51.4" rx="4.1" ry="3.7" transform="rotate(8 124 51.4)" fill="#061640"/>
    </g>
  </g>
</svg>
