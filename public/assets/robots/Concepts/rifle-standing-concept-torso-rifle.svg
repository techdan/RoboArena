<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" class="robot rifle-standing-concept-torso-rifle" data-facing="E" data-posture="standing" role="img" aria-labelledby="title desc">
  <title id="title">Torso rifle biped concept</title>
  <desc id="desc">A modern arena biped with a red armored orb body, small sensor head, and a blue rifle emerging from the body.</desc>
  <defs>
    <radialGradient id="torsoBody" cx="32%" cy="24%" r="78%">
      <stop offset="0%" stop-color="#ffe8df"/>
      <stop offset="22%" stop-color="#ff6353"/>
      <stop offset="58%" stop-color="#c91420"/>
      <stop offset="100%" stop-color="#36050a"/>
    </radialGradient>
    <radialGradient id="torsoHead" cx="38%" cy="26%" r="72%">
      <stop offset="0%" stop-color="#ffe4dc"/>
      <stop offset="35%" stop-color="#f24b40"/>
      <stop offset="100%" stop-color="#4a060d"/>
    </radialGradient>
    <linearGradient id="torsoGun" x1="79" y1="55" x2="123" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eafcff"/>
      <stop offset="22%" stop-color="#5ad0ff"/>
      <stop offset="62%" stop-color="#0876d8"/>
      <stop offset="100%" stop-color="#061742"/>
    </linearGradient>
    <linearGradient id="torsoLeg" x1="26" y1="73" x2="103" y2="119" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffc6bc"/>
      <stop offset="32%" stop-color="#df2030"/>
      <stop offset="74%" stop-color="#6d0812"/>
      <stop offset="100%" stop-color="#230309"/>
    </linearGradient>
    <linearGradient id="torsoFoot" x1="23" y1="108" x2="110" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a7b4bd"/>
      <stop offset="42%" stop-color="#303b48"/>
      <stop offset="100%" stop-color="#060a10"/>
    </linearGradient>
    <filter id="torsoShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="3.5" flood-color="#07101a" flood-opacity="0.36"/>
    </filter>
  </defs>

  <ellipse cx="66" cy="117" rx="41" ry="7.5" fill="#07101a" opacity="0.28"/>
  <g filter="url(#torsoShadow)">
    <g class="legs">
      <path d="M54 79 39 95 30 112" fill="none" stroke="#260309" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M54 79 39 95 30 112" fill="none" stroke="url(#torsoLeg)" stroke-width="5.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="39" cy="95" r="4.8" fill="#bf1420"/>
      <ellipse cx="28.2" cy="115" rx="11" ry="4.4" transform="rotate(-14 28.2 115)" fill="url(#torsoFoot)"/>
      <path d="M76 79 93 95 104 112" fill="none" stroke="#260309" stroke-width="9.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M76 79 93 95 104 112" fill="none" stroke="url(#torsoLeg)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="93" cy="95" r="5.1" fill="#bf1420"/>
      <ellipse cx="106.4" cy="115" rx="11.8" ry="4.7" transform="rotate(13 106.4 115)" fill="url(#torsoFoot)"/>
    </g>

    <g class="body">
      <path d="M36 63c5.2-16 20.4-25 37.5-22 17.5 3 29.4 17.1 28.5 34.3-1 18.8-16.5 32-36.4 31.8C42.7 106.9 27.7 87.1 36 63Z" fill="#40060d"/>
      <path d="M36.5 60.5c5.5-16.4 21.2-25.2 38.2-21.8 17.3 3.5 28.8 17.8 27.1 35-1.8 18-17.6 30.1-37.2 29.4-21.8-.8-35.8-20.2-28.1-42.6Z" fill="url(#torsoBody)"/>
      <path d="M43.5 53.7c13.2 13.3 34.7 16.7 56.4 6.7l.7 7.9c-18.6 9.7-44.9 9-61.4-6.9Z" fill="#ffd9d1" opacity="0.25"/>
      <ellipse cx="53" cy="54" rx="10.4" ry="5.2" transform="rotate(-29 53 54)" fill="#fff3ed" opacity="0.6"/>
    </g>

    <g class="torso-rifle">
      <ellipse cx="88" cy="64" rx="10.2" ry="8.4" transform="rotate(10 88 64)" fill="#061742"/>
      <ellipse cx="86" cy="62.5" rx="9.3" ry="7.3" transform="rotate(10 86 62.5)" fill="url(#torsoGun)"/>
      <rect x="94" y="59" width="29" height="7.8" rx="3.9" transform="rotate(8 94 59)" fill="url(#torsoGun)"/>
      <rect x="96" y="60.2" width="22" height="1.7" rx="0.8" transform="rotate(8 96 60.2)" fill="#f3feff" opacity="0.58"/>
      <ellipse cx="122" cy="66" rx="4.5" ry="4" transform="rotate(8 122 66)" fill="#061640"/>
    </g>

    <g class="sensor-head">
      <path d="M54 37c2.7-10 14.5-14.8 23.5-9.4 9 5.4 10.3 18.2 2.5 25.2-8.1 7.3-21.6 4.3-26.3-5.6-1.3-2.7-1.2-6.1.3-10.2Z" fill="#3c050b"/>
      <circle cx="66" cy="40" r="14" fill="url(#torsoHead)"/>
      <ellipse cx="60" cy="34" rx="6.2" ry="3" transform="rotate(-30 60 34)" fill="#fff0e8" opacity="0.58"/>
      <circle cx="73.5" cy="41.5" r="3.3" fill="#4f0710"/>
      <circle cx="74.2" cy="40.8" r="1.8" fill="#fff6ea"/>
    </g>
  </g>
</svg>
